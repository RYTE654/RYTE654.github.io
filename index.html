<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<title>ESP32 健康实时监测</title>
<style>
*{margin:0;padding:0;box-sizing:border-box;font-family:Arial}
body{background:#0f1117;color:#fff;padding:20px}
h1{text-align:center;color:#00ffd5;margin-bottom:30px}
/* 实时数值卡片 */
.data-box{
    display:flex;flex-wrap:wrap;gap:15px;
    justify-content:center;margin-bottom:30px;
}
.card{
    width:22%;min-width:140px;
    background:#1c1f26;padding:20px;border-radius:15px;
    box-shadow:0 0 20px #00ffd540;text-align:center;
}
.card h3{margin-bottom:10px;color:#00ffd5}
.card .num{font-size:28px;font-weight:bold}
/* 曲线图容器 */
.chart-box{
    width:95%;max-width:1000px;margin:15px auto;
    background:#1c1f26;padding:10px;border-radius:12px;
}
</style>
</head>
<body>
<h1>❤️ ESP32 健康实时监测</h1>

<!-- 第一部分：实时最新数值 -->
<div class="data-box">
    <div class="card">
        <h3>🌡️ 温度</h3>
        <div class="num" id="temp">--</div>
    </div>
    <div class="card">
        <h3>💧 湿度</h3>
        <div class="num" id="hum">--</div>
    </div>
    <div class="card">
        <h3>❤️ 心率</h3>
        <div class="num" id="hr">--</div>
    </div>
    <div class="card">
        <h3>🩸 血氧</h3>
        <div class="num" id="spo2">--</div>
    </div>
</div>

<!-- 第二部分：带读取密钥的曲线 -->
<div class="chart-box">
<iframe width="100%" height="280" style="border:none;"
src="https://thingspeak.com/channels/3361176/charts/1?bgcolor=%231c1f26&color=%23ff5555&dynamic=true&results=60&title=温度变化曲线(℃)&type=line&update=15&api_key=C9JIZOBNMW8UQBIK">
</iframe>
</div>
<div class="chart-box">
<iframe width="100%" height="280" style="border:none;"
src="https://thingspeak.com/channels/3361176/charts/2?bgcolor=%231c1f26&color=%233399ff&dynamic=true&results=60&title=湿度变化曲线(%)&type=line&update=15&api_key=C9JIZOBNMW8UQBIK">
</iframe>
</div>
<div class="chart-box">
<iframe width="100%" height="280" style="border:none;"
src="https://thingspeak.com/channels/3361176/charts/3?bgcolor=%231c1f26&color=%2300ffd5&dynamic=true&results=60&title=心率变化曲线(BPM)&type=line&update=15&api_key=C9JIZOBNMW8UQBIK">
</iframe>
</div>
<div class="chart-box">
<iframe width="100%" height="280" style="border:none;"
src="https://thingspeak.com/channels/3361176/charts/4?bgcolor=%231c1f26&color=%23ff9900&dynamic=true&results=60&title=血氧变化曲线(SpO2)&type=line&update=15&api_key=C9JIZOBNMW8UQBIK">
</iframe>
</div>

<script>
// 带读取密钥的数值请求
async function showData(){
    const res = await fetch("https://api.thingspeak.com/channels/3361176/feeds/last.json?api_key=C9JIZOBNMW8UQBIK");
    const d = await res.json();
    document.getElementById("temp").innerText = d.field1 + " ℃";
    document.getElementById("hum").innerText = d.field2 + " %";
    document.getElementById("hr").innerText = d.field3 + " bpm";
    document.getElementById("spo2").innerText = d.field4 + " %";
}
showData();
setInterval(showData, 5000);
</script>

</body>
</html>
