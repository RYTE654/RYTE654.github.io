<!DOCTYPE html>
<html lang="zh">

<head>

<meta charset="UTF-8">

<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>ESP32 健康监测</title>

<style>

body{
    background:#0f1117;
    color:white;
    font-family:Arial;
    text-align:center;
    padding-top:40px;
}

.card{

    width:320px;

    margin:auto;

    background:#1c1f26;

    padding:30px;

    border-radius:20px;

    box-shadow:0 0 20px #00ffd5;
}

h1{

    color:#00ffd5;
}

.data{

    font-size:24px;

    margin:20px 0;
}

.small{

    color:#999;

    font-size:14px;
}

</style>

</head>

<body>

<div class="card">

<h1>健康监测系统</h1>

<div class="data" id="temp">
温度: --
</div>

<div class="data" id="hum">
湿度: --
</div>

<div class="data" id="hr">
心率: --
</div>

<div class="data" id="spo2">
血氧: --
</div>

<div class="small">
ESP32 + MAX30102 + DHT11
</div>

</div>

<script>

async function loadData(){

    const url =
    "https://api.thingspeak.com/channels/3361176/feeds/last.json";

    try{

        const response = await fetch(url);

        const data = await response.json();

        document.getElementById("temp").innerHTML =
            "温度: " + data.field1 + " °C";

        document.getElementById("hum").innerHTML =
            "湿度: " + data.field2 + " %";

        document.getElementById("hr").innerHTML =
            "心率: " + data.field3 + " bpm";

        document.getElementById("spo2").innerHTML =
            "血氧: " + data.field4 + " %";

    }catch(err){

        console.log(err);
    }
}

loadData();

setInterval(loadData, 5000);

</script>

</body>

</html>
